<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UM6P Fitness Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="glow-orb orb-1"></div>
    <div class="glow-orb orb-2"></div>
    
    <header class="hero">
        <h1 class="gradient-text">UM6P FIT</h1>
        <p class="subtitle">Your ultimate database for optimizing performance.</p>
    </header>
    
    <main class="container">
        <div id="loader" class="loader">
            <div class="spinner"></div>
            <p>Gathering data...</p>
        </div>
        
        <div id="error-message" class="error-message hidden">
            Failed to load exercises. Please try again later.
        </div>
        
        <div id="exercise-grid" class="exercise-grid hidden">
            <!-- Exercise cards will be injected here -->
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
